version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hemodinks-mssql
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: "Hemodinks@2024!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - hemodinks-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Hemodinks@2024!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hemodinks-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=HemodinksDB;User Id=sa;Password=Hemodinks@2024!;TrustServerCertificate=true;Encrypt=false"
      JwtSettings__SecretKey: "sua_chave_secreta_super_segura_com_minimo_32_caracteres!"
      JwtSettings__Issuer: "HemodinksAPI"
      JwtSettings__Audience: "HemodinksAPI"
      JwtSettings__ExpirationMinutes: "60"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - hemodinks-network
    volumes:
      - ./logs:/app/logs

volumes:
  sqlserver_data:

networks:
  hemodinks-network:
    driver: bridge
