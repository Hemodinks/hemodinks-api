services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hemodinks-mssql
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - hemodinks-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hemodinks-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=${MSSQL_DATABASE:-HemodinksDB};User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env};TrustServerCertificate=true;Encrypt=false"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}"
      JwtSettings__Issuer: "${JWT_ISSUER:-HemodinksAPI}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-HemodinksAPI}"
      JwtSettings__ExpirationMinutes: "${JWT_EXPIRATION_MINUTES:-60}"
      PasswordReset__UseEmail: "${PasswordReset__UseEmail:-false}"
      AzureStorage__ConnectionString: "${AZURE_STORAGE_CONNECTION_STRING:-}"
      AzureStorage__ContainerName: "${AZURE_STORAGE_CONTAINER_NAME:-profile-photos}"
      AzureStorage__PublicBaseUrl: "${AZURE_STORAGE_PUBLIC_BASE_URL:-}"
      AzureStorage__MaxBytes: "${AZURE_STORAGE_MAX_BYTES:-1048576}"
      AzureStorage__PatientFilesContainerName: "${AZURE_STORAGE_PATIENT_FILES_CONTAINER_NAME:-patient-files}"
      AzureStorage__PatientFilesPublicBaseUrl: "${AZURE_STORAGE_PATIENT_FILES_PUBLIC_BASE_URL:-}"
      AzureStorage__PatientFileMaxBytes: "${AZURE_STORAGE_PATIENT_FILE_MAX_BYTES:-10485760}"
      Email__Provider: "${Email__Provider:-GmailSmtp}"
      Email__Smtp__Host: "${Email__Smtp__Host:-smtp.gmail.com}"
      Email__Smtp__Port: "${Email__Smtp__Port:-587}"
      Email__Smtp__Username: "${Email__Smtp__Username:-hemodinks.gestao.saude@gmail.com}"
      Email__Smtp__Password: "${Email__Smtp__Password:-}"
      Email__FromEmail: "${Email__FromEmail:-hemodinks.gestao.saude@gmail.com}"
      Email__FromName: "${Email__FromName:-Hemodinks}"
      Frontend__ResetPasswordUrl: "${Frontend__ResetPasswordUrl:-http://localhost:5173/reset-password}"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - hemodinks-network
    volumes:
      - ./logs:/app/logs

volumes:
  sqlserver_data:

networks:
  hemodinks-network:
    driver: bridge
