services:
  - type: web
    name: hemodinks-api-confirmation
    runtime: docker
    plan: free
    region: oregon
    branch: developer
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Confirmation
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__SecretKey
        sync: false
      - key: JwtSettings__Issuer
        value: HemodinksAPI.Confirmation
      - key: JwtSettings__Audience
        value: HemodinksAPI.Confirmation
      - key: JwtSettings__ExpirationMinutes
        value: 60
      - key: Cors__AllowedOrigins__0
        value: https://hemodinks-front-confirmation.onrender.com
      - key: AzureStorage__ConnectionString
        sync: false
      - key: AzureStorage__ContainerName
        value: profile-photos-confirmation
      - key: AzureStorage__PublicBaseUrl
        sync: false
      - key: AzureStorage__MaxBytes
        value: 1048576
      - key: AzureStorage__PatientFilesContainerName
        value: patient-files-confirmation
      - key: AzureStorage__PatientFilesPublicBaseUrl
        sync: false
      - key: AzureStorage__PatientFileMaxBytes
        value: 10485760
